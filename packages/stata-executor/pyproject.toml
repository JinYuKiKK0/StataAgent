[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "stata-executor"
version = "0.1.0"
description = "Zero-dependency Stata execution kernel with CLI and MCP adapters."
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
stata-executor = "stata_executor.adapters.cli:main"
stata-executor-mcp = "stata_executor.adapters.mcp:main"

[tool.hatch.build.targets.wheel]
packages = ["stata_executor"]
