repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        pass_filenames: false
      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        pass_filenames: false
      - id: architecture-tests
        name: architecture-tests
        entry: uv run pytest tests/architecture -q
        language: system
        pass_filenames: false
