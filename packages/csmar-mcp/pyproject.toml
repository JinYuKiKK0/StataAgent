[project]
name = "csmar-mcp"
version = "0.1.0"
description = "MCP server for querying CSMAR metadata and materializing downloads"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.26.0",
    "pandas>=3.0.1",
    "prettytable>=3.17.0",
    "urllib3>=2.6.3",
    "websocket-client>=1.9.0",
]

[project.scripts]
csmar-mcp = "csmar_mcp.server:main"

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["csmar_mcp", "csmarapi"]
